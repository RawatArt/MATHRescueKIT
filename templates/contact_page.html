<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Contact Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #ffffff;
      color: #1f2330;
      text-align: center;
    }
    .container {
      max-width: 80%;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.4;
      color: #f5a524;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }
    .contact-link {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      color: #1f2330;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 12px;
      background-color: #f7f7fb;
      width: 100%;
      max-width: 300px;
      box-sizing: border-box;
    }
    .contact-link svg {
      flex-shrink: 0;
    }
  </style>
</head>

    </p>
